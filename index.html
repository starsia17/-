<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Talk</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        #chat-area { display: none; }
        .msg { border-bottom: 1px solid #eee; padding: 5px; }
    </style>
</head>
<body>

<div id="lobby" class="container">
    <h2>닉네임: <input id="my-nick"></h2>
    <input id="new-room" placeholder="방 이름">
    <input id="new-pwd" placeholder="비밀번호(선택)">
    <button onclick="createRoom()">방 생성</button>
    <div id="room-list"></div>
</div>

<div id="chat-area" class="container">
    <button onclick="location.reload()">방 나가기</button>
    <div id="announcement" style="background:#fff3cd; padding:10px;">공지 없음</div>
    <div id="poll-area"></div>
    <div id="messages" style="height:200px; overflow-y:scroll;"></div>
    
    <div id="admin-controls" style="display:none; border:1px dashed blue; padding:10px;">
        <input id="ann-input" placeholder="공지/투표 내용">
        <button onclick="postAnnouncement()">공지 등록</button>
    </div>

    <input type="file" id="media-input" accept="image/*,video/*" onchange="sendMedia(event)">
    <input id="msg-input" placeholder="메시지 입력">
    <button onclick="sendMessage()">전송</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "", currentRoom = "", isCreator = false;

    function createRoom() {
        myName = document.getElementById('my-nick').value;
        socket.emit('createRoom', { roomName: document.getElementById('new-room').value, password: document.getElementById('new-pwd').value, creator: myName });
    }

    function join(roomName, creator, pwd) {
        if(pwd) { const p = prompt("비밀번호:"); if(p !== pwd) return alert("틀림"); }
        myName = document.getElementById('my-nick').value;
        currentRoom = roomName;
        isCreator = (myName === creator);
        socket.emit('joinRoom', { roomName, nickname: myName });
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('chat-area').style.display = 'block';
        if(isCreator) document.getElementById('admin-controls').style.display = 'block';
    }

    socket.on('updateRooms', (rooms) => {
        document.getElementById('room-list').innerHTML = rooms.map(r => `<div>${r.roomName} <button onclick="join('${r.roomName}', '${r.creator}', '${r.password}')">입장</button></div>`).join('');
    });

    function sendMessage() {
        socket.emit('chat', { room: currentRoom, sender: myName, text: document.getElementById('msg-input').value });
    }

    function sendMedia(e) {
        const reader = new FileReader();
        reader.onload = (ev) => socket.emit('chat', { room: currentRoom, sender: myName, text: ev.target.result, isMedia: true });
        reader.readAsDataURL(e.target.files[0]);
    }

    function postAnnouncement() {
        const text = document.getElementById('ann-input').value;
        socket.emit('postAnnouncement', { roomName: currentRoom, admin: myName, text: text, poll: { question: text, options: ['O', 'X'], votes: {} } });
    }

    socket.on('chat', (msg) => {
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = msg.isMedia ? `<img src="${msg.text}" width="100">` : `<strong>${msg.sender}</strong>: ${msg.text}`;
        document.getElementById('messages').appendChild(div);
    });

    socket.on('refreshRoom', (room) => {
        document.getElementById('announcement').innerText = room.announcement || "공지 없음";
        if(room.poll) {
            document.getElementById('poll-area').innerHTML = `<h3>${room.poll.question}</h3>` + room.poll.options.map(o => `<button onclick="vote('${o}')">${o}</button>`).join('');
        }
    });
    
    function vote(opt) { socket.emit('vote', { roomName: currentRoom, option: opt }); }
</script>
</body>
</html>
