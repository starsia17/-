<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>실시간 한국어 채팅</title>
<script src="/socket.io/socket.io.js"></script>
<style>
/* ─── CSS 초기화 및 변수 ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #121212;
  --surface: #1e1e1e;
  --surface2: #2d2d2d;
  --border: #383838;
  --accent: #4e5ef3;
  --accent2: #7382ff;
  --green: #2ecc71;
  --red: #e74c3c;
  --yellow: #f1c40f;
  --text: #ffffff;
  --text2: #b0b0b0;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar-w: 300px;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; }

/* ─── 레이아웃 ─── */
#app { display: flex; width: 100%; height: 100%; position: relative; }

/* ─── 사이드바 (모바일 대응) ─── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 1000;
  transition: transform var(--transition);
}
#sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
#sidebar-header h2 { font-size: 1.3rem; font-weight: 800; color: var(--accent2); display: flex; align-items: center; gap: 8px; }
#sidebar-tabs { display: flex; background: var(--surface); padding: 4px; border-bottom: 1px solid var(--border); }
.stab {
  flex: 1; padding: 12px 4px; text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--text2);
  cursor: pointer; border-radius: var(--radius-sm); transition: all var(--transition);
}
.stab.active { background: var(--surface2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

.stab-panel { display: none; flex: 1; overflow-y: auto; padding: 16px; }
.stab-panel.active { display: flex; flex-direction: column; gap: 12px; }

/* ─── 프로필 카드 ─── */
#profile-card {
  background: var(--surface2); border-radius: var(--radius); padding: 20px;
  display: flex; flex-direction: column; align-items: center; gap: 12px; border: 1px solid var(--border);
}
#profile-avatar {
  width: 84px; height: 84px; border-radius: 50%; object-fit: cover;
  border: 4px solid var(--accent); cursor: pointer; transition: transform 0.2s;
}
#profile-avatar:active { transform: scale(0.95); }
#profile-nickname { font-size: 1.1rem; font-weight: 800; }
#profile-ip { font-size: 0.75rem; color: var(--text2); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; }
#profile-edit-btn {
  width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
  padding: 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 4px;
}
#admin-badge { background: var(--yellow); color: #000; font-size: 0.7rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; }

/* ─── 프로필 수정 폼 ─── */
#edit-profile-form {
  background: var(--surface2); border-radius: var(--radius); padding: 16px;
  border: 1px solid var(--border); display: none; flex-direction: column; gap: 12px;
}
#edit-profile-form.visible { display: flex; }
.form-input {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px; color: var(--text); font-size: 0.9rem; width: 100%; outline: none;
}
.form-row { display: flex; gap: 8px; }
.btn-save { background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); padding: 12px; font-weight: 700; flex: 1; }
.btn-cancel { background: var(--surface); color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-weight: 700; flex: 1; }

/* ─── 친구 목록 및 배지 ─── */
.section-title { font-size: 0.8rem; font-weight: 800; color: var(--text2); margin: 8px 0 4px; padding-left: 4px; }
.friend-item {
  display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius-sm);
  background: var(--surface2); border: 1px solid var(--border); position: relative; cursor: pointer;
}
.friend-item:active { background: var(--border); }
.friend-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
.friend-info { flex: 1; }
.friend-name { font-size: 0.95rem; font-weight: 700; }
.friend-status { font-size: 0.75rem; color: var(--text2); }
.badge-new, .badge-change {
  position: absolute; top: 8px; right: 8px; font-size: 0.6rem; font-weight: 900;
  padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
}
.badge-new { background: var(--accent); color: #fff; }
.badge-change { background: var(--green); color: #fff; }

/* ─── 참여자 요약/자세히 ─── */
#participants-summary {
  background: var(--surface2); border-radius: var(--radius-sm); padding: 14px;
  display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid var(--border);
}
.count-badge { background: var(--accent); padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
#participants-detail { display: none; flex-direction: column; gap: 8px; margin-top: 8px; max-height: 250px; overflow-y: auto; }
#participants-detail.open { display: flex; }

/* ─── 메인 채팅 영역 ─── */
#main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg); }
#chat-header {
  padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; z-index: 10;
}
#chat-header h1 { font-size: 1.1rem; font-weight: 800; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#hamburger-btn { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; padding: 4px; display: none; }
#back-to-general {
  display: none; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; cursor: pointer;
}

#messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

/* ─── 메시지 버블 ─── */
.msg-wrapper { display: flex; gap: 12px; max-width: 85%; }
.msg-wrapper.mine { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
.msg-body { display: flex; flex-direction: column; gap: 4px; }
.msg-wrapper.mine .msg-body { align-items: flex-end; }
.msg-sender { font-size: 0.8rem; font-weight: 700; color: var(--text2); }
.msg-bubble {
  padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; word-break: break-all;
}
.msg-wrapper.mine .msg-bubble { background: var(--accent); color: #fff; border-top-right-radius: 4px; }
.msg-wrapper.other .msg-bubble { background: var(--surface2); color: #fff; border-top-left-radius: 4px; border: 1px solid var(--border); }
.msg-time { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
.msg-notice { align-self: center; background: rgba(241,196,15,0.1); border: 1px solid var(--yellow); color: var(--yellow); padding: 8px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; }

/* ─── 입력창 (모바일 최적화) ─── */
#input-area {
  padding: 16px 20px; background: var(--surface); border-top: 1px solid var(--border);
  display: flex; gap: 12px; align-items: flex-end; padding-bottom: max(16px, env(safe-area-inset-bottom));
}
#msg-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 24px;
  padding: 12px 20px; color: var(--text); font-size: 1rem; outline: none; resize: none;
  max-height: 120px; min-height: 48px; line-height: 1.4;
}
#send-btn {
  width: 48px; height: 48px; background: var(--accent); color: #fff; border: none;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.2s; flex-shrink: 0;
}
#send-btn:active { transform: scale(0.9); }

/* ─── 모바일 오버레이 ─── */
#sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; backdrop-filter: blur(4px);
}

/* ─── 알림(토스트) ─── */
#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
  background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 30px;
  font-weight: 700; box-shadow: var(--shadow); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 3000; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ─── 반응형 ─── */
@media (max-width: 768px) {
  #sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); width: 85%; max-width: 320px; }
  #sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
  #sidebar-overlay.open { display: block; }
  #hamburger-btn { display: block; }
  #messages-area { padding: 16px; }
  #input-area { padding: 12px; }
}
</style>
</head>
<body>

<div id="app">
  <div id="sidebar-overlay"></div>
  
  <!-- 사이드바 -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2><span>💬</span> 한글 채팅방</h2>
    </div>
    <div id="sidebar-tabs">
      <div class="stab active" data-tab="profile">내 프로필</div>
      <div class="stab" data-tab="friends">친구 관리</div>
      <div class="stab" data-tab="online">참여자</div>
    </div>

    <!-- 프로필 탭 -->
    <div class="stab-panel active" id="tab-profile">
      <div id="profile-card">
        <img id="profile-avatar" src="/default-profile.png" alt="프로필" />
        <div id="profile-nickname">사용자 정보를 불러오는 중...</div>
        <div id="profile-ip">IP: ---.---.---.---</div>
        <div id="admin-badge" style="display:none">👑 관리자</div>
        <button id="profile-edit-btn">프로필 수정하기</button>
      </div>

      <div id="edit-profile-form">
        <div class="section-title">닉네임 변경</div>
        <input class="form-input" id="edit-nickname" type="text" placeholder="새로운 닉네임 입력" />
        <div class="section-title">프로필 사진 업로드</div>
        <input class="form-input" id="edit-image" type="file" accept="image/*" />
        <div class="form-row">
          <button class="btn-save" id="save-profile-btn">변경사항 저장</button>
          <button class="btn-cancel" id="cancel-edit-btn">취소</button>
        </div>
      </div>
    </div>

    <!-- 친구 탭 -->
    <div class="stab-panel" id="tab-friends">
      <div class="section-title">새로운 친구 추가</div>
      <div style="display:flex; gap:8px;">
        <input class="form-input" id="add-friend-input" type="text" placeholder="닉네임 입력" style="flex:1" />
        <button class="btn-save" id="add-friend-btn" style="flex:none; width:auto; padding:0 16px;">신청</button>
      </div>

      <div class="section-title" style="margin-top:20px">받은 친구 요청</div>
      <div id="friend-requests-list"></div>

      <div class="section-title" style="margin-top:20px">내 친구 목록 (클릭 시 1:1 채팅)</div>
      <div id="friends-list"></div>
    </div>

    <!-- 참여자 탭 -->
    <div class="stab-panel" id="tab-online">
      <div id="participants-summary">
        <span>현재 접속 중</span>
        <div style="display:flex; align-items:center; gap:8px">
          <span class="count-badge" id="online-count">0</span>
          <span style="font-size:0.7rem">▼</span>
        </div>
      </div>
      <div id="participants-detail"></div>
    </div>
  </aside>

  <!-- 메인 채팅창 -->
  <main id="main">
    <header id="chat-header">
      <button id="hamburger-btn">☰</button>
      <button id="back-to-general">← 전체채팅으로</button>
      <h1 id="chat-room-title">🌐 전체 채팅방</h1>
      <div id="header-right">
        <span id="header-online" style="font-size:0.8rem; color:var(--text2); font-weight:700;">0명 접속</span>
      </div>
    </header>

    <div id="messages-area"></div>

    <div id="input-area">
      <textarea id="msg-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      <button id="send-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </main>
</div>

<div id="toast">메시지 내용</div>

<script>
let currentUser = null;
let socket = io();
let currentChatTarget = null;

// 초기화
async function init() {
  try {
    const res = await fetch('/api/user');
    currentUser = await res.json();
    renderProfile();
    loadFriends();
    loadFriendRequests();
    socket.emit('join', {
      id: currentUser._id,
      nickname: currentUser.nickname,
      profileImage: currentUser.profileImage,
      socketId: socket.id
    });
  } catch (e) { showToast('서버 연결에 실패했습니다.'); }
}

function renderProfile() {
  document.getElementById('profile-avatar').src = currentUser.profileImage || '/default-profile.png';
  document.getElementById('profile-nickname').textContent = currentUser.nickname;
  document.getElementById('profile-ip').textContent = 'IP: ' + (currentUser.ip || '알 수 없음');
  if (currentUser.isAdmin) document.getElementById('admin-badge').style.display = 'inline-block';
}

// 친구 목록 로드 (배지 포함)
async function loadFriends() {
  if (!currentUser) return;
  const res = await fetch(`/api/friends/list/${currentUser._id}`);
  const friends = await res.json();
  const list = document.getElementById('friends-list');
  list.innerHTML = friends.length ? '' : '<div style="text-align:center; padding:20px; color:var(--text2); font-size:0.85rem;">추가된 친구가 없습니다.</div>';
  
  const now = new Date();
  const oneDay = 24 * 60 * 60 * 1000;

  friends.forEach(f => {
    const div = document.createElement('div');
    div.className = 'friend-item';
    let badge = '';
    if (f.newFriendAdded && (now - new Date(f.newFriendAdded)) < oneDay) badge = '<span class="badge-new">NEW</span>';
    else if (f.lastProfileUpdate && (now - new Date(f.lastProfileUpdate)) < oneDay) badge = '<span class="badge-change">CHANGE</span>';

    div.innerHTML = `
      <img class="friend-avatar" src="${f.profileImage}" onerror="this.src='/default-profile.png'" />
      <div class="friend-info">
        <div class="friend-name">${esc(f.nickname)}</div>
        <div class="friend-status">온라인 대기 중</div>
      </div>
      ${badge}
    `;
    div.onclick = () => startPrivateChat(f);
    list.appendChild(div);
  });
}

// 1:1 채팅 시작
function startPrivateChat(friend) {
  currentChatTarget = friend._id;
  document.getElementById('chat-room-title').textContent = `🔒 ${friend.nickname}님과 비밀 대화`;
  document.getElementById('back-to-general').style.display = 'block';
  document.getElementById('messages-area').innerHTML = '';
  if (window.innerWidth <= 768) toggleSidebar(false);
  showToast(`${friend.nickname}님과 대화를 시작합니다.`);
}

document.getElementById('back-to-general').onclick = () => {
  currentChatTarget = null;
  document.getElementById('chat-room-title').textContent = '🌐 전체 채팅방';
  document.getElementById('back-to-general').style.display = 'none';
  document.getElementById('messages-area').innerHTML = '';
  socket.emit('join', currentUser); // 최근 메시지 다시 불러오기
};

// 소켓 이벤트
socket.on('receive_message', msg => { if (!currentChatTarget) appendMessage(msg); });
socket.on('receive_private_message', msg => {
  if (currentChatTarget && (msg.senderId._id === currentChatTarget || msg.receiverId === currentChatTarget)) appendMessage(msg);
  else if (msg.senderId._id !== currentUser._id) showToast(`✉️ ${msg.senderId.nickname}님의 새 메시지`);
});
socket.on('user_list_update', users => {
  document.getElementById('online-count').textContent = users.length;
  document.getElementById('header-online').textContent = users.length + '명 접속';
  const detail = document.getElementById('participants-detail');
  detail.innerHTML = users.map(u => `
    <div class="participant-row" style="display:flex; align-items:center; gap:10px; padding:8px; background:var(--surface2); border-radius:8px;">
      <img src="${u.profileImage}" onerror="this.src='/default-profile.png'" style="width:30px; height:30px; border-radius:50%;" />
      <span style="font-size:0.85rem; font-weight:700;">${esc(u.nickname)}</span>
    </div>
  `).join('');
});
socket.on('recent_messages', msgs => {
  document.getElementById('messages-area').innerHTML = '';
  msgs.forEach(appendMessage);
  scrollToBottom();
});

function appendMessage(msg) {
  const area = document.getElementById('messages-area');
  const isMine = (msg.senderId._id || msg.senderId) === currentUser._id;
  const time = new Date(msg.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = `msg-wrapper ${isMine ? 'mine' : 'other'}`;
  div.innerHTML = `
    <img class="msg-avatar" src="${msg.senderId.profileImage}" onerror="this.src='/default-profile.png'" />
    <div class="msg-body">
      <div class="msg-sender">${esc(msg.senderId.nickname)}</div>
      <div class="msg-bubble">${esc(msg.content)}</div>
      <div class="msg-time">${time}</div>
    </div>
  `;
  area.appendChild(div);
  scrollToBottom();
}

// 메시지 전송
function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;
  socket.emit('send_message', { senderId: currentUser._id, receiverId: currentChatTarget, content });
  input.value = '';
  input.style.height = '48px';
}

// UI 이벤트
document.getElementById('send-btn').onclick = sendMessage;
document.getElementById('msg-input').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
document.getElementById('msg-input').oninput = function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; };

const toggleSidebar = (open) => {
  document.getElementById('sidebar').classList.toggle('open', open);
  document.getElementById('sidebar-overlay').classList.toggle('open', open);
};
document.getElementById('hamburger-btn').onclick = () => toggleSidebar(true);
document.getElementById('sidebar-overlay').onclick = () => toggleSidebar(false);

document.querySelectorAll('.stab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.stab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  };
});

document.getElementById('participants-summary').onclick = () => document.getElementById('participants-detail').classList.toggle('open');

// 프로필 수정
document.getElementById('profile-edit-btn').onclick = () => document.getElementById('edit-profile-form').classList.toggle('visible');
document.getElementById('cancel-edit-btn').onclick = () => document.getElementById('edit-profile-form').classList.remove('visible');
document.getElementById('save-profile-btn').onclick = async () => {
  const nick = document.getElementById('edit-nickname').value.trim();
  const file = document.getElementById('edit-image').files[0];
  if (!nick && !file) return showToast('변경할 내용을 입력하세요.');
  const fd = new FormData();
  if (nick) fd.append('nickname', nick);
  if (file) fd.append('profileImage', file);
  const res = await fetch('/api/user/update', { method: 'POST', body: fd });
  currentUser = await res.json();
  renderProfile();
  document.getElementById('edit-profile-form').classList.remove('visible');
  showToast('프로필이 성공적으로 변경되었습니다.');
  socket.emit('join', currentUser);
};

// 유틸리티
function esc(s) { return s ? s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])) : ''; }
function scrollToBottom() { const a = document.getElementById('messages-area'); a.scrollTop = a.scrollHeight; }
function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
