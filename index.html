<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Family Talk</title>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; cursor: pointer; }
        .modal { display: none; position: fixed; top: 20%; left: 10%; width: 80%; padding: 20px; background: white; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="lobby">
        <img id="my-profile" class="profile-img" src="default.png" onclick="document.getElementById('profileInput').click()">
        <input type="file" id="profileInput" hidden onchange="setProfile(event)">
        <input id="nickname" placeholder="닉네임">
        <button onclick="login()">접속</button>
        <div id="friend-list"><h3>친구 목록</h3><ul id="friends"></ul></div>
    </div>

    <div id="chat-room" style="display:none;">
        <h3 id="room-title"></h3>
        <ul id="messages"></ul>
        <input type="file" id="mediaInput" accept="image/*,video/*" onchange="sendMedia(event)">
        <input id="chatInput">
        <button onclick="sendMessage()">전송</button>
    </div>

    <div id="profile-modal" class="modal">
        <img id="modal-img" width="100">
        <h2 id="modal-name"></h2>
        <button onclick="addFriend()">친구 추가</button>
        <button onclick="document.getElementById('profile-modal').style.display='none'">닫기</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myData = JSON.parse(localStorage.getItem('user')) || {nickname: '', profilePic: ''};

        // 로컬 데이터 로드
        window.onload = () => {
            if(myData.nickname) document.getElementById('nickname').value = myData.nickname;
        };

        function setProfile(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { myData.profilePic = ev.target.result; document.getElementById('my-profile').src = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        }

        function login() {
            myData.nickname = document.getElementById('nickname').value;
            localStorage.setItem('user', JSON.stringify(myData));
            socket.emit('join', myData);
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('chat-room').style.display = 'block';
        }

        // 미디어 전송 (사진/영상 구분)
        function sendMedia(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                socket.emit('chat message', {
                    room: 'General',
                    username: myData.nickname,
                    text: ev.target.result,
                    isMedia: true,
                    isVideo: file.type.startsWith('video')
                });
            };
            reader.readAsDataURL(file);
        }

        // 메시지 수신 처리
        socket.on('chat message', (msg) => {
            const li = document.createElement('li');
            li.innerHTML = msg.isMedia ? 
                (msg.isVideo ? `<strong>${msg.username}</strong>: <video src="${msg.text}" width="200" controls></video>` 
                             : `<strong>${msg.username}</strong>: <img src="${msg.text}" width="200">`)
                : `<strong>${msg.username}</strong>: ${msg.text}`;
            document.getElementById('messages').appendChild(li);
        });

        socket.on('system', (msg) => alert(msg));
        socket.on('friendAlert', (data) => {
            if(confirm(`${data.sender}님으로부터 친구 요청이 왔습니다. 수락할까요?`)) {
                socket.emit('acceptFriend', { myNickname: myData.nickname, friendNickname: data.sender });
            }
        });
    </script>
</body>
</html>
