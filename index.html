<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>패밀리톡 (Family Talk)</title>
<script src="/socket.io/socket.io.js"></script>
<style>
/* ... (사용자님이 제공해주신 CSS를 그대로 사용하세요) ... */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --bg: #121212; --surface: #1e1e1e; --surface2: #2d2d2d; --border: #383838; --accent: #4e5ef3; --accent2: #7382ff; --green: #2ecc71; --red: #e74c3c; --yellow: #f1c40f; --text: #ffffff; --text2: #b0b0b0; --radius: 16px; --radius-sm: 10px; --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); --sidebar-w: 300px; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: sans-serif; }
#app { display: flex; width: 100%; height: 100%; }
#sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; transition: transform var(--transition); }
#sidebar-tabs { display: flex; background: var(--surface); padding: 4px; border-bottom: 1px solid var(--border); }
.stab { flex: 1; padding: 12px 4px; text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--text2); cursor: pointer; border-radius: var(--radius-sm); }
.stab.active { background: var(--surface2); color: var(--text); }
.stab-panel { display: none; flex: 1; overflow-y: auto; padding: 16px; }
.stab-panel.active { display: flex; flex-direction: column; gap: 12px; }
#chat-area { display: flex; flex-direction: column; flex: 1; background: var(--bg); }
#messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg-wrapper { display: flex; gap: 12px; }
.msg-wrapper.mine { align-self: flex-end; flex-direction: row-reverse; }
.msg-bubble { padding: 12px 16px; border-radius: 18px; background: var(--surface2); color: #fff; }
.msg-wrapper.mine .msg-bubble { background: var(--accent); }
#input-area { padding: 16px; display: flex; gap: 10px; background: var(--surface); }
#msg-input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: #fff; }
#edit-profile-form { display: none; }
#edit-profile-form.visible { display: flex; flex-direction: column; gap: 10px; }
@media (max-width: 768px) { #sidebar { position: fixed; transform: translateX(-100%); width: 85%; } #sidebar.open { transform: translateX(0); } }
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div id="sidebar-tabs">
      <div class="stab active" data-tab="profile">내 프로필</div>
      <div class="stab" data-tab="friends">친구 관리</div>
      <div class="stab" data-tab="online">참여자</div>
    </div>

    <div class="stab-panel active" id="tab-profile">
      <div id="profile-card">
        <img id="profile-avatar" src="/default-profile.png" width="80" style="border-radius:50%"/>
        <div id="profile-nickname">닉네임 로딩중...</div>
        <button id="profile-edit-btn">프로필 수정</button>
      </div>
      <div id="edit-profile-form">
        <input id="edit-nickname" placeholder="새 닉네임" />
        <input id="edit-image" type="file" />
        <button id="save-profile-btn">저장</button>
      </div>
    </div>

    <div class="stab-panel" id="tab-friends">
      <input id="add-friend-input" placeholder="친구 닉네임" />
      <button id="add-friend-btn">친구 신청</button>
      <div id="friend-requests-list"></div>
      <div id="friends-list"></div>
    </div>

    <div class="stab-panel" id="tab-online">
      <div id="participants-detail"></div>
    </div>
  </aside>

  <main id="chat-area">
    <header id="chat-header" style="padding:15px; border-bottom:1px solid #333;">
      <h1 id="chat-room-title">전체 채팅</h1>
    </header>
    <div id="messages-area"></div>
    <div id="input-area">
      <textarea id="msg-input" placeholder="메시지..."></textarea>
      <button id="send-btn">전송</button>
    </div>
  </main>
</div>

<script>
let currentUser = null;
const socket = io();

async function init() {
