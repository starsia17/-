<!DOCTYPE html>
<html>
<body>
  <div id="lobby">
    <input id="nickname" placeholder="닉네임 입력">
    <input id="roomName" placeholder="방 이름 입력">
    <button onclick="createRoom()">방 만들기</button>
    <h3>방 목록</h3>
    <ul id="room-list"></ul>
  </div>

  <div id="chat-room" style="display:none;">
    <h3 id="current-room-name"></h3>
    <ul id="messages"></ul>
    <form id="form">
      <input id="input" autocomplete="off" /><button>전송</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentRoom = "";

    // [방 만들기] 서버로 방 생성 요청
    function createRoom() {
      const nickname = document.getElementById('nickname').value;
      const roomName = document.getElementById('roomName').value;
      if (nickname && roomName) {
        socket.emit('createRoom', { roomName, nickname });
      }
    }

    // [방 목록 업데이트] 서버에서 새 방 알림을 받음
    socket.on('roomCreated', (room) => {
      const roomList = document.getElementById('room-list');
      const li = document.createElement('li');
      li.textContent = room.roomName + " (방장: " + room.creator + ")";
      li.onclick = () => joinRoom(room.roomName);
      roomList.appendChild(li);
    });

    // [방 입장]
    function joinRoom(roomName) {
      currentRoom = roomName;
      socket.emit('joinRoom', roomName);
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('chat-room').style.display = 'block';
      document.getElementById('current-room-name').textContent = roomName + " 채팅방";
    }

    // [메시지 보내기] room 정보와 함께 보냄
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const nickname = document.getElementById('nickname').value;
      if (input.value) {
        socket.emit('chat message', { room: currentRoom, text: input.value, username: nickname });
        input.value = '';
      }
    });

    // [메시지 수신]
    socket.on('chat message', (msg) => {
      const item = document.createElement('li');
      item.textContent = msg.username + ": " + msg.text;
      document.getElementById('messages').appendChild(item);
    });
  </script>
</body>
</html>
